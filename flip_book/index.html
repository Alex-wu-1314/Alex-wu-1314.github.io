        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --ink: #1a1208;
            --paper: #f5f0e8;
            --paper2: #ede8d8;

        .wrap {

            font-family: 'Inconsolata', monospace;
            display: flex;
            flex-direction: column;
            align-items: center; /* 水平居中所有内容 */
            padding: 40px 0 20px;
            min-height: 100vh;
            background: #dfd7c0; /* 增加背景色对比 */
        }

        /* 标签栏样式 */
        .tab-row {
            display: flex;
            gap: 3px;
            margin-bottom: -1px;
            z-index: 5;
            width: 620px;       /* 强制与 .scene 宽度一致 */
            padding-left: 24px; /* 补偿脊柱位置 */
        }

        .tab {
            background: var(--paper2);
            border: 1.5px solid #b8a880;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            padding: 4px 14px;
            /* 关键修改：标签字体替换为 Inconsolata */
            font-family: 'Inconsolata', monospace;
            font-size: 14px;
            color: var(--pencil);
            cursor: pointer;
            transition: background 0.2s;
        }

        .tab.active {
            background: var(--paper);
            color: var(--ink);
            font-weight: 700;
            height: 32px; /* 略微高出一点点 */
        }

        /* book container */
        .scene {
            perspective: 1800px;
            width: 620px;
            height: 460px;
            position: relative;
        }

        .book {
            width: 620px;
            height: 460px;
            position: relative;
        }

        /* spine */
        .spine {
            position: absolute;
            left: -18px;
            top: 0;
            bottom: 0;
            width: 22px;
            background: linear-gradient(90deg, #5a1500, #7a1f00, #5a1500);
            border-radius: 6px 0 0 6px;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spine-text {
            /* 关键修改：脊柱字体替换为 Inconsolata */
            font-family: 'Inconsolata', monospace;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            font-size: 11px;
            color: #e8c896;
            letter-spacing: 2px;
        }

        .page {
            position: absolute;
            inset: 0;
            border-radius: 4px 12px 12px 4px;
            transform-origin: left center;
            transform-style: preserve-3d;
            transition: transform 0.65s cubic-bezier(0.645, 0.045, 0.355, 1.000);
            backface-visibility: hidden;
            overflow: hidden;
        }

        .page.flipped {
            transform: rotateY(-175deg);
        }

        /* paper pages (pages 1-4) */
        .paper {
            background: var(--paper);
            border: 1.5px solid #c8b896;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }

        /* 修复横线 */
        .paper::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(transparent, transparent 27px, #e0d8c8 27px, #e0d8c8 28px);
            pointer-events: none;
            opacity: 0.45;
            z-index: 0;
        }

        .paper::after {
            content: '';
            position: absolute;
            left: 54px;
            top: 0;
            bottom: 0;
            width: 1.5px;
            background: #e8a090;
            opacity: 0.6;
            pointer-events: none;
            z-index: 0;
        }

            background: #8b2500;
            border: 3px solid #5a1500;
            box-shadow: inset -6px 0 15px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;

            font-family: 'Inconsolata', monospace;
            font-weight: 700;
            font-size: 32px;
            color: #f5e6c8;
            text-align: center;
            line-height: 1.3;

// Initialization
const container = document.getElementById('pagesContainer');

const tabDefs = [{label:'About',pg:1},{label:'Skills',pg:2},{label:'Blog',pg:3},{label:'Contact',pg:4}];
const tabRow = document.getElementById('tabs');
tabDefs.forEach(td => {
  const el = document.createElement('div');
  el.className = 'tab';
  el.id = 'tab_' + td.pg;
  el.textContent = td.label;
  el.onclick = () => jumpTo(td.pg);
  tabRow.appendChild(el);
});

let current = 0;

function flipFwd(i) {
  const el = document.getElementById('p' + i);
  if (el) el.classList.add('flipped');
}
function flipBck(i) {
  const el = document.getElementById('p' + i);
  if (el) el.classList.remove('flipped');
}

function go(dir) {
  const next = current + dir;
  if (next < 0 || next > 4) return;
  if (dir > 0) {
    flipFwd(current);
  } else {
    flipBck(next);
  }
  current = next;
  updateUI();
}

function jumpTo(target) {
  if (target === current) return;
  if (target > current) {
    for (let i = current; i < target; i++) flipFwd(i);
  } else {
    for (let i = current - 1; i >= target; i--) flipBck(i);
  }
  current = target;
  updateUI();
}

document.getElementById('p0').onclick = function() { if (current === 0) go(1); };

function updateUI() {
  const names = ['Cover','About','Skills','Blog','Contact'];
  const nums  = ['Cover','1 / 4','2 / 4','3 / 4','4 / 4'];
  document.getElementById('pgind').textContent = names[current] + (current > 0 ? '  ' + nums[current] : '');
  document.getElementById('prevBtn').disabled = current <= 0;
  document.getElementById('nextBtn').disabled = current >= 4;
  
  tabDefs.forEach(td => {
    const el = document.getElementById('tab_' + td.pg);
    if (el) el.className = 'tab' + (td.pg === current ? ' active' : '');
  });
  
  if (current === 2) setTimeout(animateBars, 400);
}

function animateBars() {
  document.querySelectorAll('.bar-fill').forEach(b => { 
      if (b.dataset.w) b.style.width = b.dataset.w; 
  });
}

updateUI();
</script>
